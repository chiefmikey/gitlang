AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: GitLang API - Lambda Function URL behind CloudFront

Globals:
  Function:
    Timeout: 30

Resources:
  GitLangApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gitlang-api
      Handler: index.handler
      Runtime: nodejs20.x
      CodeUri: ../dist/lambda/
      MemorySize: 256
      Architectures:
        - arm64
      Environment:
        Variables:
          NODE_ENV: production
      FunctionUrlConfig:
        AuthType: NONE
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub 'arn:aws:secretsmanager:us-east-2:${AWS::AccountId}:secret:AUTH_GITLANG*'

Outputs:
  FunctionUrl:
    Description: Lambda Function URL (use as CloudFront origin)
    Value: !GetAtt GitLangApiFunctionUrl.FunctionUrl
  FunctionArn:
    Description: Lambda Function ARN
    Value: !GetAtt GitLangApiFunction.Arn
