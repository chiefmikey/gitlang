AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  GitLang GitHub PAT rotation infrastructure (optional).
  Deploy with: npm run build:rotation && sam deploy --template-file infra/cloudformation-rotation.yml --stack-name gitlang-rotation --capabilities CAPABILITY_NAMED_IAM --parameter-overrides NotificationEmail=your@email.com

Parameters:
  NotificationEmail:
    Type: String
    Description: Email address for rotation notifications

  RotationSchedule:
    Type: String
    Default: 'rate(30 days)'
    Description: How often to check/rotate the token

Resources:
  RotationNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: gitlang-token-rotation
      Subscription:
        - Protocol: email
          Endpoint: !Ref NotificationEmail

  RotationLambdaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gitlang-rotate-token
      Handler: index.handler
      Runtime: nodejs20.x
      CodeUri: ../dist/rotation/
      Timeout: 30
      MemorySize: 128
      Architectures:
        - arm64
      Environment:
        Variables:
          SNS_TOPIC_ARN: !Ref RotationNotificationTopic
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
                - secretsmanager:PutSecretValue
                - secretsmanager:UpdateSecretVersionStage
                - secretsmanager:DescribeSecret
              Resource: !Sub 'arn:aws:secretsmanager:us-east-2:${AWS::AccountId}:secret:AUTH_GITLANG*'
        - Statement:
            - Effect: Allow
              Action: sns:Publish
              Resource: !Ref RotationNotificationTopic

  RotationLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref RotationLambdaFunction
      Action: lambda:InvokeFunction
      Principal: secretsmanager.amazonaws.com

  SecretRotationSchedule:
    Type: AWS::SecretsManager::RotationSchedule
    Properties:
      SecretId: AUTH_GITLANG
      RotationLambdaARN: !GetAtt RotationLambdaFunction.Arn
      RotationRules:
        ScheduleExpression: !Ref RotationSchedule

Outputs:
  NotificationTopicArn:
    Description: SNS topic for rotation notifications
    Value: !Ref RotationNotificationTopic

  LambdaFunctionArn:
    Description: Rotation Lambda ARN
    Value: !GetAtt RotationLambdaFunction.Arn
